## How to Run

### Requirements

* Flutter SDK installed
* Dart SDK compatible with the project environment
* iOS, Android, or another Flutter-supported platform

### Installation

1. Clone the repository

   ```bash
   git clone https://github.com/woshixiyangyang/focus_ai_todo.git
   cd focus_ai_todo
   ```

2. Install dependencies

   ```bash
   flutter pub get
   ```

3. Run the app

   ```bash
   flutter run
   ```

## How It Works

* **Creating a task:** Users can add a task from the home screen by entering a title and description.
* **Using AI to split tasks:** From the task details screen, users can ask the app to break a larger task into smaller steps.
* **Viewing planned tasks:** The app organizes tasks by priority and due date to suggest a more manageable working order.

## Current Status

This project has completed its core prototype structure and README documentation. Basic task management, task planning, video-based interface experimentation, and AI-assisted workflow exploration have been implemented in the current version.

